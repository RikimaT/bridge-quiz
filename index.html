}

function QuestionCard({ quiz, index, onAnswer, onBack }) {

    <div style={{ minHeight: "100dvh", background: P.bg, display: "flex", flexDirection: "column", paddingTop: 20 }}>
      <div style={{ display: "flex", alignItems: "center", padding: "0 20px", marginBottom: 16 }}>
        {index > 0 && <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: P.muted, padding: "4px 8px" }}>← 戻る</button>}
        <div style={{ flex: 1 }} /><div style={{ fontSize: 11, color: P.muted }}>{quiz.title}</div>
      </div>
      <ProgressBar current={index} total={quiz.questions.length} />
      <div style={{ padding: "0 24px", flex: 1 }}>
        <h2 style={{ fontSize: 17, fontWeight: 700, color: P.text, lineHeight: 1.7, marginBottom: 28 }}>{question.q}</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {question.options.map(function(opt, i) { return (
            <button key={i} onClick={function(){handleSelect(i)}} style={{ background: selected === i ? P.accentLight : P.card, border: selected === i ? "2px solid " + P.accent : "1.5px solid " + P.border, borderRadius: 12, padding: "16px 18px", cursor: "pointer", textAlign: "left", fontSize: 14, color: P.text, lineHeight: 1.6, transition: "all 0.15s", display: "flex", alignItems: "flex-start", gap: 12 }}>
              <span style={{ width: 24, height: 24, borderRadius: "50%", border: selected === i ? "2px solid " + P.accent : "2px solid " + P.border, background: selected === i ? P.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1, fontSize: 12, color: "white", fontWeight: 700, transition: "all 0.15s" }}>{selected === i ? "✓" : ""}</span>
              {opt.text}
            </button>
          )})}
        </div>
      </div>
      <div style={{ padding: "20px 24px", textAlign: "center", fontSize: 11, color: P.muted }}>🔒 回答は記録されません。お気軽にお答えください。</div>
    </div>
  );
}

function ResultCard({ quiz, totalScore, onRestart, onHome }) {
  const result = quiz.results.find(function(r) { return totalScore >= r.min && totalScore <= r.max; }) || quiz.results[quiz.results.length - 1];
  const maxScore = quiz.questions.length * 3;
  const pct = Math.round((totalScore / maxScore) * 100);
  return (
    <div style={{ minHeight: "100dvh", background: P.bg, padding: "32px 20px" }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: 11, letterSpacing: 3, color: P.accent, marginBottom: 16, fontWeight: 600 }}>診断結果</div>
        <div style={{ width: 120, height: 120, borderRadius: "50%", background: "conic-gradient(" + P.accent + " " + (pct * 3.6) + "deg, " + P.borderLight + " 0deg)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
          <div style={{ width: 100, height: 100, borderRadius: "50%", background: P.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontSize: 32 }}>{result.emoji}</div>
            <div style={{ fontSize: 11, color: P.muted, marginTop: 2 }}>{totalScore} / {maxScore}</div>
          </div>
        </div>
        <div style={{ display: "inline-block", background: P.accentLight, padding: "6px 16px", borderRadius: 20, fontSize: 13, fontWeight: 700, color: P.accent }}>{result.type}</div>
      </div>
      <div style={{ background: P.card, border: "1.5px solid " + P.border, borderRadius: 16, padding: 24, marginBottom: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.03)" }}>
        <h2 style={{ fontSize: 18, fontWeight: 800, color: P.text, lineHeight: 1.7, marginBottom: 16, whiteSpace: "pre-line" }}>{result.headline}</h2>
        <p style={{ fontSize: 14, color: P.sub, lineHeight: 1.9, whiteSpace: "pre-line", marginBottom: 20 }}>{result.body}</p>
        <div style={{ background: P.accentLight, borderRadius: 12, padding: 18, borderLeft: "4px solid " + P.accent }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: P.accent, marginBottom: 8 }}>ブリッジならこう変わります</div>
          <p style={{ fontSize: 13, color: P.sub, lineHeight: 1.8, whiteSpace: "pre-line", margin: 0 }}>{result.bridge}</p>
        </div>
      </div>
      <div style={{ background: P.card, border: "1.5px solid " + P.border, borderRadius: 16, padding: 20, marginBottom: 20 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: P.text, marginBottom: 12 }}>おすすめのコース</div>
        {result.recommend.map(function(r, i) { return (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: i < result.recommend.length - 1 ? "1px solid " + P.borderLight : "none" }}>
            <span style={{ width: 24, height: 24, borderRadius: 6, background: P.accentLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: P.accent, fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
            <span style={{ fontSize: 13, color: P.sub, lineHeight: 1.5 }}>{r}</span>
          </div>
        )})}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
        <a href={CTA_URL} target="_blank" rel="noopener noreferrer" style={{ display: "block", textAlign: "center", background: "linear-gradient(135deg, " + P.accent + ", #D4944E)", color: "white", padding: "16px 24px", borderRadius: 12, fontSize: 15, fontWeight: 700, textDecoration: "none", boxShadow: "0 4px 16px rgba(193,122,58,0.3)", letterSpacing: 0.5 }}>この結果をもとに無料で相談する →</a>
        <a href={SITE_URL} target="_blank" rel="noopener noreferrer" style={{ display: "block", textAlign: "center", background: P.card, border: "1.5px solid " + P.border, color: P.sub, padding: "14px 24px", borderRadius: 12, fontSize: 13, fontWeight: 600, textDecoration: "none" }}>ブリッジについてもっと知る</a>
      </div>
      <div style={{ background: P.accentLight, borderRadius: 12, padding: 18, textAlign: "center", marginBottom: 24 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: P.accent, marginBottom: 6 }}>この診断、お友達にもシェアしませんか？</div>
        <div style={{ fontSize: 12, color: P.sub, lineHeight: 1.6 }}>同じ悩みを持つ保護者の方にも<br/>きっと役立つはずです</div>
      </div>
      <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 20 }}>
        <button onClick={onRestart} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, color: P.muted, textDecoration: "underline" }}>もう一度やり直す</button>
        <button onClick={onHome} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, color: P.muted, textDecoration: "underline" }}>トップに戻る</button>
      </div>
      <div style={{ textAlign: "center", fontSize: 11, color: P.muted, paddingBottom: 20, lineHeight: 1.6 }}>総合学習教室ブリッジ｜滋賀県彦根市稲枝町<br/>TEL 0749-20-5392（平日14:00〜20:00）</div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("select");
  const [quizKey, setQuizKey] = useState(null);
  const [currentQ, setCurrentQ] = useState(0);
  const [scores, setScores] = useState([]);
  const quiz = quizKey ? QUIZZES[quizKey] : null;
  const handleSelect = function(key) { setQuizKey(key); setCurrentQ(0); setScores([]); setScreen("quiz"); };
  const handleAnswer = function(score) { const ns = scores.concat([score]); setScores(ns); if (currentQ + 1 < quiz.questions.length) setCurrentQ(currentQ + 1); else setScreen("result"); };
  const handleBack = function() { if (currentQ > 0) { setCurrentQ(currentQ - 1); setScores(scores.slice(0, -1)); } };
  const totalScore = scores.reduce(function(a, b) { return a + b; }, 0);
  if (screen === "select") return React.createElement(QuizSelector, { onSelect: handleSelect });
  if (screen === "quiz" && quiz) return React.createElement(QuestionCard, { quiz: quiz, index: currentQ, onAnswer: handleAnswer, onBack: handleBack });
  if (screen === "result" && quiz) return React.createElement(ResultCard, { quiz: quiz, totalScore: totalScore, onRestart: function() { setCurrentQ(0); setScores([]); setScreen("quiz"); }, onHome: function() { setScreen("select"); setQuizKey(null); } });
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
